<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat ASCII Art</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        h1 {
            font-size: 2em;
            margin-bottom: 30px;
        }
        pre {
            font-size: 14px;
            line-height: 1.2;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐱 Cat ASCII Art 🐱</h1>
        <pre>
  /\_/\
 ( o.o )
  > ^ <
 /|   |\
(_|   |_)
        </pre>
    </div>
</body>
</html>
